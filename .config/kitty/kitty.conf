# ─────────────────────────────────────────────────────────────────────────────
# 🌌 AryanOS Kitty Terminal Custom Configuration File
# ─────────────────────────────────────────────────────────────────────────────

# ── Typography & Fonts ────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12.0
adjust_line_height  115%
disable_ligatures   never

# Enable fallback support for Sanskrit / Devanagari Unicode glyphs
symbol_map U+0900-U+097F Noto Sans Devanagari

# ── Theme Colors & Styling ────────────────────────────────────────────────────
# AryanOS Sacred Palette
background            #111111
foreground            #F5F0E6
cursor                #D97706
cursor_text_color     #111111
selection_background  #D4AF37
selection_foreground  #111111

# Window Opacity
background_opacity 0.92

# ── Window Layout & Decoration ───────────────────────────────────────────────
remember_window_size  no
initial_width         960
initial_height        600
window_padding_width  12
hide_window_decorations yes
confirm_os_window_close 0

# ── Terminal Bell ────────────────────────────────────────────────────────────
enable_audio_bell no

# ── Tab Bar Styling ──────────────────────────────────────────────────────────
tab_bar_edge bottom
tab_bar_style powerline
active_tab_foreground   #111111
active_tab_background   #D4AF37
inactive_tab_foreground #F5F0E6
inactive_tab_background #1A1A1A
