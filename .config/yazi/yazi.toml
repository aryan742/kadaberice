# ─────────────────────────────────────────────────────────────────────────────
# 🌌 AryanOS Yazi Terminal File Explorer Config
# ─────────────────────────────────────────────────────────────────────────────

[manager]
ratio          = [ 1, 3, 4 ]
sort_by        = "modified"
sort_sensitive = false
sort_reverse   = true
sort_dir_first = true
show_hidden    = true
show_symlink   = true

[preview]
tab_size        = 4
max_width       = 1200
max_height      = 900
image_filter    = "triangle"
image_quality   = 90
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_x      = 0
ueberzug_y      = 0

[opener]
edit = [
    { run = '${EDITOR:-nvim} "$@"', block = true, for = "unix" }
]
play = [
    { run = 'mpv "$@"', orphan = true, for = "unix" }
]
open = [
    { run = 'xdg-open "$@"', orphan = true, for = "unix" }
]

[open]
rules = [
    { name = "*.html", use = [ "open" ] },
    { mime = "text/*", use = [ "edit" ] },
    { mime = "image/*", use = [ "open" ] },
    { mime = "video/*", use = [ "play" ] },
    { mime = "application/pdf", use = [ "open" ] }
]

[input]
# Cursor shapes in input dialogs
cursor_blink = true
