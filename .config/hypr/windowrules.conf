# ─────────────────────────────────────────────────────────────────
# AryanOS — Window Rules & Intelligent Workspace Routing
# ─────────────────────────────────────────────────────────────────

# ── Workspace Assignments ────────────────────────────────────────

# Workspace 1: Terminals
windowrule = workspace 1, match:class ^(kitty)$
windowrule = workspace 1, match:class ^(Alacritty)$

# Workspace 2: Browsers
windowrule = workspace 2, match:class ^(vivaldi-stable)$
windowrule = workspace 2, match:class ^(firefox)$
windowrule = workspace 2, match:class ^(google-chrome)$
windowrule = workspace 2, match:class ^(Brave-browser)$

# Workspace 3: Coding IDEs
windowrule = workspace 3, match:class ^(code-oss)$
windowrule = workspace 3, match:class ^(VSCode)$
windowrule = workspace 3, match:class ^(jetbrains-.*)$

# Workspace 6: Creative suite
windowrule = workspace 6, match:class ^(Gimp.*)$
windowrule = workspace 6, match:class ^(inkscape)$
windowrule = workspace 6, match:class ^(blender)$
windowrule = workspace 6, match:class ^(kdenlive)$

# Workspace 7: Media player
windowrule = workspace 7, match:class ^(mpv)$
windowrule = workspace 7, match:class ^(vlc)$
windowrule = workspace 7, match:class ^(spotify)$

# Workspace 8: Virtual Machines
windowrule = workspace 8, match:class ^(virt-manager)$
windowrule = workspace 8, match:class ^(VirtualBox.*)$


# ── Floating Controls ────────────────────────────────────────────

# System dialogs, overlays, control panels, file chooser dialogs
windowrule = float 1, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(blueman-manager)$
windowrule = float 1, match:class ^(file-roller)$
windowrule = float 1, match:class ^(org.gnome.FileRoller)$
windowrule = float 1, match:class ^(Thunar)$, match:title ^(File Operation Progress)$
windowrule = float 1, match:class ^(Thunar)$, match:title ^(Confirm to replace files)$
windowrule = float 1, match:class ^(xdg-desktop-portal-gtk)$

# Elegant float sizes & placement for control popups
windowrule = size 800 600, match:class ^(pavucontrol)$
windowrule = center 1, match:class ^(pavucontrol)$

windowrule = size 700 500, match:class ^(blueman-manager)$
windowrule = center 1, match:class ^(blueman-manager)$

# Set transparency to keep dynamic wallpapers visible on system panels
windowrule = opacity 0.95, match:class ^(pavucontrol)$
windowrule = opacity 0.95, match:class ^(blueman-manager)$
