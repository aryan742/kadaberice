# ─────────────────────────────────────────────────────────────────
# AryanOS — Premium & Apple-Fluid Animations
# ─────────────────────────────────────────────────────────────────

animations {
    enabled = true

    # Fluid Expo Bezier Curve (Fast start, ultra-smooth deceleration)
    bezier = fluidDecel, 0.16, 1, 0.3, 1
    bezier = quickIn, 0.7, 0, 0.84, 0
    bezier = easeOutQuad, 0.25, 1, 0.5, 1

    # Window Transitions
    animation = windows, 1, 3.5, fluidDecel, slide
    animation = windowsIn, 1, 3.5, fluidDecel, slide
    animation = windowsOut, 1, 3.0, fluidDecel, slide
    animation = windowsMove, 1, 3.5, fluidDecel

    # Fade Effects
    animation = fade, 1, 3.0, easeOutQuad
    animation = fadeIn, 1, 2.5, easeOutQuad
    animation = fadeOut, 1, 2.5, easeOutQuad
    animation = fadeSwitch, 1, 3.5, easeOutQuad

    # Border & Active State Transitions
    animation = border, 1, 4.0, easeOutQuad
    animation = borderangle, 0, 8.0, easeOutQuad # No distracting spin animation
    
    # Workspace slide
    animation = workspaces, 1, 4.0, fluidDecel, slide
}
