# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua



$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = hyprlauncher

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, b, exec, vivaldi

exec-once = /usr/lib/polkit-kde-authentication-agent-1

# ─────────────────────────────────────────────────────────────────
# SCREENSHOT CONFIGURATION
# Script:    ~/.config/hypr/scripts/screenshot.sh
# Tool chain: grim + slurp + wl-clipboard
# Save path:  ~/Pictures/Screenshots/YYYY-MM-DD_HH-MM-SS.png
# Configured: 2026-05-29
# ─────────────────────────────────────────────────────────────────

$screenshot = ~/.config/hypr/scripts/screenshot.sh

# Print              → Fullscreen → save to ~/Pictures/Screenshots/
bind = , Print, exec, $screenshot full

# Super + Print      → Region selection → save to ~/Pictures/Screenshots/
bind = $mainMod, Print, exec, $screenshot region

# Shift + Print      → Active window → save to ~/Pictures/Screenshots/
bind = SHIFT, Print, exec, $screenshot window

# Super+Shift+Print  → Region selection → clipboard only (no file)
bind = $mainMod SHIFT, Print, exec, $screenshot region-cb

# Ctrl + Print       → Active window → clipboard only (no file)
bind = CTRL, Print, exec, $screenshot window-cb

# ─────────────────────────────────────────────────────────────────
# END SCREENSHOT CONFIGURATION
# ─────────────────────────────────────────────────────────────────
