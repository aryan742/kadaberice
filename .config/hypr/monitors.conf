# ─────────────────────────────────────────────────────────────────
# AryanOS — Monitors & Workspace Bindings Configuration
# ─────────────────────────────────────────────────────────────────

# Monitor Outputs (Auto-detect & scaling)
monitor=,preferred,auto,1

# Default Workspace Rules (Assigned to primary monitor)
workspace = 1, monitor:desc:*, default:true
workspace = 2, monitor:desc:*
workspace = 3, monitor:desc:*
workspace = 4, monitor:desc:*
workspace = 5, monitor:desc:*
workspace = 6, monitor:desc:*
workspace = 7, monitor:desc:*
workspace = 8, monitor:desc:*
workspace = 9, monitor:desc:*
