# ─────────────────────────────────────────────────────────────────
# AryanOS — Secure Minimalist Lockscreen (Hyprlock)
# ─────────────────────────────────────────────────────────────────

# Background: Blurred Saffron / Dark Theme
background {
    monitor =
    path = screenshot
    color = rgba(17, 17, 17, 0.9)

    # Blur properties
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Time Widget (Center)
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>"
    color = rgba(217, 119, 6, 1.0) # Primary Saffron
    font_size = 120
    font_family = JetBrains Mono Nerd Font, Noto Sans Devanagari
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
}

# Date Widget (Below Time)
label {
    monitor =
    text = cmd[update:18000000] echo "<b> $(date +"%A, %d %b %Y") </b>"
    color = rgba(245, 240, 230, 0.9) # Ivory
    font_size = 30
    font_family = JetBrains Mono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}

# The Dharma Symbol or Greeting
label {
    monitor =
    text = ॐ  Tamaso Ma Jyotir Gamaya
    color = rgba(212, 175, 55, 0.8) # Gold
    font_size = 18
    font_family = Noto Sans Devanagari, JetBrains Mono Nerd Font
    position = 0, -50
    halign = center
    valign = center
}

# Password Input Field
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 ellipse
    
    outer_color = rgba(217, 119, 6, 0.8) # Saffron outline
    inner_color = rgba(17, 17, 17, 0.8) # Dark background
    font_color = rgba(245, 240, 230, 1.0) # Ivory text
    
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    rounding = 8
    
    check_color = rgba(212, 175, 55, 1.0) # Gold while checking
    fail_color = rgba(127, 29, 29, 1.0) # Crimson on fail
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    
    position = 0, -150
    halign = center
    valign = center
}
