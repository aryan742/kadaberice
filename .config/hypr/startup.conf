# ─────────────────────────────────────────────────────────────────
# AryanOS — Startup Daemons & System Autostart
# ─────────────────────────────────────────────────────────────────

# ── Polkit (Authentication UI agent) ─────────────────────────────
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# ── Desktop Status Bar & UI ──────────────────────────────────────
exec-once = waybar
exec-once = ags run

# ── Notifications Daemon ──────────────────────────────────────────
exec-once = dunst

# ── Clipboard History (wl-clipboard & cliphist integration) ─────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Wallpaper Setup ──────────────────────────────────────────────
# Launch hyprpaper daemon first
exec-once = hyprpaper

# Run the custom wallpaper rotation automation in the background
# exec-once = ~/.config/hypr/scripts/wallpaper.sh
exec-once = waypaper --restore

# ── Window Switcher (Snappy Switcher) ────────────────────────────
exec-once = snappy-switcher --daemon
