# ─────────────────────────────────────────────────────────────────
# AryanOS — Keybindings & Navigation Configuration
# ─────────────────────────────────────────────────────────────────

# Binds modifier key
$mainMod = SUPER

# Applications Binds
bind = $mainMod, Q, exec, kitty
bind = $mainMod, E, exec, thunar
bind = $mainMod, R, exec, rofi -show drun -theme dmenu
bind = $mainMod, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, P, pseudo,
bind = $mainMod, S, layoutmsg, togglesplit

# System & Session Binds
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, M, exec, wlogout || hyprctl dispatch exit

# Focus navigation (Vim keys)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows around (Vim keys)
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Resize windows (Vim keys)
binde = $mainMod ALT, h, resizeactive, -30 0
binde = $mainMod ALT, l, resizeactive, 30 0
binde = $mainMod ALT, k, resizeactive, 0 -30
binde = $mainMod ALT, j, resizeactive, 0 30

# Workspace Navigation (1-9)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move Active Window to Workspace (1-9)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Multimedia & System Keys (Volume, Brightness)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ─────────────────────────────────────────────────────────────────
# ARYANOS SCREENSHOT SYSTEM BINDINGS
# Grim + Slurp + wl-clipboard
# ─────────────────────────────────────────────────────────────────
$screenshot = ~/.config/hypr/scripts/screenshot.sh

# Print              → Full-screen screenshot
bind = , Print, exec, $screenshot full

# Super + Print      → Region selection screenshot
bind = $mainMod, Print, exec, $screenshot region

# Shift + Print      → Active window screenshot
bind = SHIFT, Print, exec, $screenshot window

# Super + Shift + Print  → Region selection → clipboard only (no file)
bind = $mainMod SHIFT, Print, exec, $screenshot region-cb

# Ctrl + Print       → Active window → clipboard only (no file)
bind = CTRL, Print, exec, $screenshot window-cb

# ─────────────────────────────────────────────────────────────────
# NEW TOOLS (Hyprlock, Snappy-Switcher, Waypaper)
# ─────────────────────────────────────────────────────────────────
# Lock Screen
bind = $mainMod, L, exec, hyprlock

# Window Switcher (Alt + Tab)
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev

# ─────────────────────────────────────────────────────────────────
# AGS v2 (Astal) Dashboard Keybinds
# ─────────────────────────────────────────────────────────────────
# App Launcher Carousel
bind = $mainMod, Space, exec, astal toggle app-launcher

# Workspace Carousel
bind = $mainMod, Tab, exec, astal toggle workspace-carousel

# Wallpaper Carousel
bind = $mainMod SHIFT, W, exec, astal toggle wallpaper-carousel
